<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beschreibung</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .like-section { margin-top: 20px; display: flex; align-items: center; gap: 15px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #like-count { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Wanderung durch das Elbsandsteingebirge</h1>
    <p>Hier steht deine Routenbeschreibung...</p>

    <div class="like-section">
        <button id="like-btn" onclick="voteUp()">👍 Route empfehlen (+1)</button>
        <span id="like-count">Lade Likes...</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 2. Deine Supabase-Verbindungsdaten
        // Ersetze diese unbedingt mit deinen echten Schlüsseln!
        const SUPABASE_URL = "https://DEIN_PROJEKT_ID.supabase.co";
        const SUPABASE_ANON_KEY = "DEIN_ANONYMER_PUBLIC_KEY";
        
        // --- DIE ENTSCHEIDENDE ÄNDERUNG ---
        // Wir nennen deine Variable 'mySupabaseClient', damit sie NICHT 
        // mit der globalen 'supabase'-Variable der Bibliothek kollidiert.
        let mySupabaseClient;

        const ROUTE_ID = "Gilfert"; // ID dieser Route
        const likeBtn = document.getElementById('like-btn');
        const likeCountSpan = document.getElementById('like-count');

        // 3. Initialisierungs-Funktion
        function initSupabase() {
            try {
                // Wir nutzen 'mySupabaseClient'
                mySupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase Client erfolgreich initialisiert.");
                loadLikes();
                checkIfVoted();
            } catch (err) {
                console.error("Fehler bei der Supabase-Initialisierung. Vermutlich sind URL oder Key falsch:", err);
                likeCountSpan.innerText = "Verbindungsfehler";
                likeBtn.disabled = true;
            }
        }

        // 4. Funktion: Aktuelle Likes aus der Datenbank laden
        async function loadLikes() {
            if (!mySupabaseClient) return;

            const { data, error } = await mySupabaseClient
                .from('route_likes')
                .select('likes')
                .eq('route_id', ROUTE_ID)
                .single();

            if (error && error.code !== 'PGRST116') { // PGRST116 = keine Likes gefunden
                console.error("Fehler beim Laden der Likes:", error);
                likeCountSpan.innerText = "Fehler";
            } else {
                likeCountSpan.innerText = data ? `${data.likes} Empfehlungen` : "0 Empfehlungen";
            }
        }

        // 5. Funktion: Bei Klick die "+1" SQL-Funktion in Supabase ausführen
        async function voteUp() {
            // Diese Funktion ist jetzt definitiv im globalen Scope definiert,
            // solange initSupabase() nicht abstürzt.
            if (!mySupabaseClient) {
                console.error("voteUp abgebrochen: Supabase Client nicht bereit.");
                return;
            }

            likeBtn.disabled = true; 
            likeBtn.innerText = "Sende...";
            
            const { error } = await mySupabaseClient.rpc('increment_like', { target_route_id: ROUTE_ID });

            if (error) {
                console.error("Fehler beim Voten:", error);
                likeBtn.disabled = false;
                likeBtn.innerText = "👍 Route empfehlen (+1)";
            } else {
                await loadLikes();
                localStorage.setItem(`voted_${ROUTE_ID}`, 'true');
                checkIfVoted();
            }
        }

        // 6. Funktion: Prüft LocalStorage
        function checkIfVoted() {
            if (localStorage.getItem(`voted_${ROUTE_ID}`)) {
                likeBtn.disabled = true;
                likeBtn.innerText = "Bereits empfohlen ✔";
            }
        }

        // Starte alles
        initSupabase();
    </script>
</body>
</html>
