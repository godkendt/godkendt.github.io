<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beschreibung</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .like-section { margin-top: 20px; display: flex; align-items: center; gap: 15px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #like-count { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Wanderung durch das Elbsandsteingebirge</h1>
    <p>Hier steht deine Routenbeschreibung...</p>

    <div class="like-section">
        <button id="like-btn" onclick="voteUp()">👍 Route empfehlen (+1)</button>
        <span id="like-count">Lade Likes...</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 2. Supabase Verbindung herstellen (Ersetze mit deinen echten Daten aus den Settings)
        const SUPABASE_URL = "https://kpicbgulkgflhidxhvgv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwaWNiZ3Vsa2dmbGhpZHhodmd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDM3NzYsImV4cCI6MjA5NDY3OTc3Nn0.UoMOeI0NXWNVS3FeLT8knL5-2eax9TaEfx8TcEfBvb8"; // Dieser Key DARF im Quellcode stehen!
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. ID dieser Route festlegen (Muss dem Dateinamen oder einer ID entsprechen)
        const ROUTE_ID = "route1"; 

        const likeBtn = document.getElementById('like-btn');
        const likeCountSpan = document.getElementById('like-count');

        // Funktion: Aktuelle Likes aus der Datenbank laden
        async function loadLikes() {
            const { data, error } = await supabase
                .from('route_likes')
                .select('likes')
                .eq('route_id', ROUTE_ID)
                .single();

            if (error && error.code !== 'PGRST116') { // PGRST116 bedeutet "Keine Zeile gefunden" (0 Likes)
                console.error("Fehler beim Laden:", error);
                likeCountSpan.innerText = "Fehler";
            } else {
                likeCountSpan.innerText = data ? `${data.likes} Empfehlungen` : "0 Empfehlungen";
            }
        }

        // Funktion: Bei Klick die "+1" Funktion in Supabase ausführen
        async function voteUp() {
            likeBtn.disabled = true; // Button sperren, damit kein Spam entsteht
            
            // Ruft die in Schritt 1 erstellte SQL-Funktion auf
            const { error } = await supabase.rpc('increment_like', { target_route_id: ROUTE_ID });

            if (error) {
                console.error("Fehler beim Voten:", error);
                likeBtn.disabled = false;
            } else {
                // Likes nach erfolgreichem Eintrag direkt neu laden
                await loadLikes();
                // Optional: Im LocalStorage speichern, damit der User nach Neuladen nicht sofort wieder klicken kann
                localStorage.setItem(`voted_${ROUTE_ID}`, 'true');
                checkIfVoted();
            }
        }

        // Verhindert, dass der gleiche Browser mehrfach klickt (einfacher Schutz)
        function checkIfVoted() {
            if (localStorage.getItem(`voted_${ROUTE_ID}`)) {
                likeBtn.disabled = true;
                likeBtn.innerText = "Bereits empfohlen ✔";
            }
        }

        // Beim Laden der Seite ausführen
        loadLikes();
        checkIfVoted();
    </script>
</body>
</html>
